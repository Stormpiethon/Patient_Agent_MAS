name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true

    - name: Run tests
      run: |
        python -m pytest tests/ -v || true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Deploy to Azure VM
      env:
        SSH_KEY: ${{ secrets.PATIENT_SSH_KEY }}
        VM_USER: ${{ secrets.VM_USER }}
        VM_IP: ${{ secrets.VM_IP }}
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/Patient2Key.pem
        chmod 600 ~/.ssh/Patient2Key.pem

        ssh -o StrictHostKeyChecking=no -i ~/.ssh/Patient2Key.pem ${VM_USER}@${VM_IP} << 'EOF'
          cd /home/azureuser/Patient_Agent_MAS
          git pull origin main
          python3 -m venv venv || true
          source venv/bin/activate
          pip install -r requirements.txt -q
          pkill -f "uvicorn api.server" || true
          sleep 2
          nohup uvicorn api.server:app --host 0.0.0.0 --port 8000 > api.log 2>&1 &
          echo "API deployed successfully"
        EOF
